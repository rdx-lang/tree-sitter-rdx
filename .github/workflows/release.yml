name: Release
run-name: Release ${{ github.ref_name }}

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  validate-version:
    name: Validate Version Tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate tag against package.json
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          TAG_VERSION="${TAG#v}"

          PKG_VERSION=$(jq -r '.version' package.json)

          echo "Tag version: $TAG_VERSION"
          echo "package.json version: $PKG_VERSION"

          if [[ ! "$TAG_VERSION" =~ ^([0-9]+\.[0-9]+\.[0-9]+)(-[a-zA-Z]+\.[0-9]+)?$ ]]; then
            echo "::error::Invalid tag format '$TAG'. Expected: vX.Y.Z or vX.Y.Z-label.N"
            exit 1
          fi

          TAG_BASE="${BASH_REMATCH[1]}"
          PKG_BASE=$(echo "$PKG_VERSION" | grep -oP '^\d+\.\d+\.\d+')

          if [[ "$TAG_BASE" != "$PKG_BASE" ]]; then
            echo "::error::Base version mismatch! Tag '$TAG_BASE' != package.json '$PKG_BASE'"
            exit 1
          fi

          echo "version=$TAG_VERSION" >> $GITHUB_OUTPUT

  ci:
    name: CI
    needs: validate-version
    uses: ./.github/workflows/ci.yml

  publish-npm:
    name: Publish to npm
    needs: [validate-version, ci]
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Update npm for OIDC support
        run: npm install -g npm@latest

      - name: Install dependencies
        run: bun install

      - name: Generate parser
        run: bun x tree-sitter generate

      - name: Sync version from tag
        run: |
          VERSION="${{ needs.validate-version.outputs.version }}"
          jq --arg v "$VERSION" '.version = $v' package.json > tmp.json && mv tmp.json package.json
          echo "Set package.json version to $VERSION"

      - name: Publish
        run: |
          VERSION="${{ needs.validate-version.outputs.version }}"
          if npm view tree-sitter-rdx@$VERSION version 2>/dev/null; then
            echo "tree-sitter-rdx@$VERSION already published to npm — skipping"
          else
            TAG_FLAG=""
            if [[ "$VERSION" == *-* ]]; then
              PRERELEASE="${VERSION#*-}"
              TAG_FLAG="--tag ${PRERELEASE%%.*}"
            fi
            npm publish --access public --provenance $TAG_FLAG
          fi

  publish-crate:
    name: Publish to crates.io
    needs: [validate-version, ci]
    runs-on: ubuntu-latest
    environment: crates-io
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Sync version from tag
        run: |
          VERSION="${{ needs.validate-version.outputs.version }}"
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" Cargo.toml
          echo "Set Cargo.toml version to $VERSION"

      - name: Publish to crates.io
        run: |
          VERSION="${{ needs.validate-version.outputs.version }}"
          if cargo search tree-sitter-rdx --limit 1 2>/dev/null | grep -q "\"$VERSION\""; then
            echo "tree-sitter-rdx@$VERSION already published to crates.io — skipping"
          else
            cargo publish --allow-dirty
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  build-wheels:
    name: Build wheels (${{ matrix.os }})
    needs: [validate-version, ci]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync version from tag
        shell: bash
        run: |
          VERSION="${{ needs.validate-version.outputs.version }}"
          sed -i.bak "s/^version = \".*\"/version = \"$VERSION\"/" pyproject.toml
          echo "Set pyproject.toml version to $VERSION"

      - name: Build wheels
        uses: pypa/cibuildwheel@v3
        with:
          output-dir: dist

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: dist

  build-sdist:
    name: Build source distribution
    needs: validate-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync version from tag
        run: |
          VERSION="${{ needs.validate-version.outputs.version }}"
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" pyproject.toml
          echo "Set pyproject.toml version to $VERSION"

      - name: Build sdist
        run: pip install build && python -m build --sdist --outdir dist

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist

  publish-pypi:
    name: Publish to PyPI
    needs: [validate-version, build-wheels, build-sdist]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/tree-sitter-rdx
    permissions:
      id-token: write
    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
