# Reusable test workflow: generate, build, test.
#
# Called by:
#   - ci.yml      (PR checks)
#   - release.yml (pre-publish gate)

name: Test

on:
  workflow_call:

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Generate parser
        run: bun x tree-sitter generate

      - name: Run tests
        run: bun x tree-sitter test
